<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>UniNovel</title>
  <style>
    * { margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #000;
      font-family: sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    a, button, input, [tabindex] { outline: 2px solid transparent; }
    a:focus, button:focus, input:focus, [tabindex]:focus {
      outline-color: #0066cc;
    }

    /* Header */
    header {
      background: #eee;
      padding: 10px;
      border-bottom: 1px solid #ccc;
      overflow: hidden;
    }

    header h1 {
      font-size: 18px;
      color: #0066cc;
      cursor: pointer;
      margin-bottom: 6px;
    }

    .search-bar { width: 100%; }
    .search-bar input {
      width: 65%;
      padding: 6px 8px;
      border: 1px solid #aaa;
      background: #fff;
      color: #000;
      font-size: 14px;
      float: left;
    }
    .search-bar button {
      float: left;
      padding: 6px 12px;
      border: 1px solid #0066cc;
      background: #0066cc;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    /* Views */
    main { padding: 10px; }
    .view { display: none; }
    .view.active { display: block; }

    /* Novel list */
    .novel-list { width: 100%; }

    .novel-card {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      overflow: hidden;
    }
    .novel-card:hover, .novel-card:focus { border-color: #0066cc; }

    .novel-card h3 { font-size: 15px; color: #000; }
    .novel-card .s-badge {
      float: right;
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
    }

    .novel-card .h-badge {
      font-size: 12px;
      color: #0066cc;
      margin-top: 4px;
    }

    /* Details */
    .back-btn {
      background: #eee;
      border: 1px solid #ccc;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 10px;
      color: #000;
    }

    .details-info { margin-bottom: 12px; }
    .details-info h2 { font-size: 20px; color: #0066cc; margin-bottom: 6px; }

    .desc {
      font-size: 14px;
      color: #333;
      max-height: 200px;
      overflow: auto;
      white-space: pre-wrap;
      background: #f5f5f5;
      padding: 8px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
    }

    .tag {
      display: inline-block;
      background: #eee;
      border: 1px solid #ccc;
      padding: 2px 6px;
      font-size: 12px;
      margin: 0 4px 4px 0;
      color: #333;
    }

    .continue-btn {
      width: 100%;
      background: #0066cc;
      color: #fff;
      border: none;
      padding: 10px;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    /* Chapter list */
    .chapter-list { overflow: hidden; }
    .chapter-item {
      float: left;
      width: 30%;
      margin: 1.5%;
      padding: 6px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .chapter-item:hover, .chapter-item:focus { border-color: #0066cc; }

    /* Reader */
    .reader-container { max-width: 900px; }

    .reader-ctrl {
      padding: 8px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      margin-bottom: 12px;
      overflow: hidden;
      text-align: center;
    }
    .reader-ctrl .l { float: left; }
    .reader-ctrl .r { float: right; }

    .nav-btn {
      background: #eee;
      border: 1px solid #ccc;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 14px;
      color: #000;
    }
    .nav-btn:disabled { background: #f5f5f5; color: #aaa; border-color: #ddd; cursor: default; }

    #reader-content {
      font-size: 16px;
      line-height: 1.8;
      font-family: serif;
      color: #000;
      padding: 6px;
    }
    #reader-content img { max-width: 100%; height: auto; }
    #reader-content p { margin-bottom: 1em; }

    /* Loader */
    .loader {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      text-align: center;
      padding-top: 200px;
      z-index: 200;
      color: #fff;
      font-size: 16px;
    }

    /* Misc */
    .section-title {
      font-size: 16px;
      color: #0066cc;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
      margin: 16px 0 10px 0;
    }

    .error {
      color: #c00;
      text-align: center;
      padding: 16px;
      border: 1px solid #c00;
      background: #fff0f0;
    }
  </style>
</head>
<body>

<header>
  <h1 id="logo-title" tabindex="0">UniNovel</h1>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search novels...">
    <button id="search-btn">Search</button>
  </div>
</header>

<main>
  <div id="view-home" class="view active">
    <div id="history-section" style="display:none">
      <div class="section-title">Continue Reading</div>
      <div id="history-list" class="novel-list"></div>
    </div>
    <div class="section-title" id="home-title">New Releases</div>
    <div id="novel-list" class="novel-list"></div>
  </div>

  <div id="view-details" class="view">
    <button class="back-btn" id="back-btn">&larr; Back</button>
    <div id="details-container"></div>
  </div>

  <div id="view-reader" class="view">
    <div class="reader-container">
      <div class="reader-ctrl">
        <button class="nav-btn l" id="btn-list">&equiv; List</button>
        <button class="nav-btn l" id="btn-prev">Prev</button>
        <span style="display:inline-block;padding:0 8px;font-size:13px;color:#666;">
          <span id="reader-novel-title" style="display:block;"></span>
          <span id="reader-chapter-title" style="font-weight:bold;color:#000;"></span>
        </span>
        <button class="nav-btn r" id="btn-next">Next</button>
      </div>
      <div id="reader-content"></div>
      <div class="reader-ctrl" style="text-align:center;">
        <button class="nav-btn" id="btn-prev-btm" style="margin-right:16px;">Prev</button>
        <button class="nav-btn" id="btn-next-btm">Next</button>
      </div>
    </div>
  </div>

  <div id="loader" class="loader" style="display:none;">Loading...</div>
</main>

<script>
  // Polyfills
  if (!Date.now) Date.now = function(){ return +new Date(); };
  if (!window.console) window.console = { log:function(){}, error:function(){}, warn:function(){} };

  function parseHTML(html) {
    try { return new DOMParser().parseFromString(html, "text/html"); }
    catch(e) {
      try { var d = document.implementation.createHTMLDocument(""); d.documentElement.innerHTML = html; return d; }
      catch(e2) { return null; }
    }
  }

  function qs(el, sel) { return (el || document).querySelector(sel); }
  function qsa(el, sel) { return (el || document).querySelectorAll(sel); }
  function txt(el, fb) { return el ? (el.textContent||el.innerText||"").replace(/^\s+|\s+$/g,"") : (fb||""); }
  function attr(el, a, fb) { return el ? (el.getAttribute(a)||fb||"") : (fb||""); }
  function html(el, fb) { return el ? (el.innerHTML||"").replace(/^\s+|\s+$/g,"") : (fb||""); }

  function addClass(el, c) { if(!el)return; if(el.classList){el.classList.add(c);return;} var a=el.className.split(" ");for(var i=0;i<a.length;i++)if(a[i]===c)return;a.push(c);el.className=a.join(" "); }
  function removeClass(el, c) { if(!el)return; if(el.classList){el.classList.remove(c);return;} var a=el.className.split(" "),r=[];for(var i=0;i<a.length;i++)if(a[i]!==c)r.push(a[i]);el.className=r.join(" "); }

  function parallel(tasks, cb) {
    var results = [], done = 0, total = tasks.length, errd = false;
    if (!total) { cb(null, []); return; }
    for (var pi = 0; pi < total; pi++) (function(idx) {
      tasks[idx](function(err, r) {
        if (errd) return;
        if (err) { errd = true; cb(err); return; }
        results[idx] = r; done++;
        if (done === total) cb(null, results);
      });
    })(pi);
  }

  var storage = (function() {
    function set(k, v) {
      try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch(e) {}
      try { document.cookie = k + "=" + encodeURIComponent(JSON.stringify(v)) + ";path=/;max-age=31536000"; return true; } catch(e) {}
      return false;
    }
    function get(k) {
      try { var v = localStorage.getItem(k); if(v!=null) return JSON.parse(v); } catch(e) {}
      try { var m = document.cookie.match(new RegExp("(?:^| )" + k + "=([^;]+)")); if(m) return JSON.parse(decodeURIComponent(m[1])); } catch(e) {}
      return null;
    }
    return {get:get, set:set};
  })();

  // ===== API SERVICE =====

  function Api() { this.proxy = "https://relaxed-churros-9a35ea.netlify.app/?destination="; }

  Api.prototype._req = function(url, opts, cb) {
    if (typeof opts === "function") { cb = opts; opts = {}; }
    var xhr = new XMLHttpRequest();
    xhr.open((opts&&opts.method)||"GET", url, true);
    if (opts && opts.headers) for (var k in opts.headers) if (opts.headers.hasOwnProperty(k)) xhr.setRequestHeader(k, opts.headers[k]);
    xhr.onreadystatechange = function() { if (xhr.readyState===4) { if (xhr.status>=200 && xhr.status<300) cb(null, xhr.responseText); else cb(new Error("HTTP "+xhr.status)); } };
    xhr.onerror = function() { cb(new Error("Network error")); };
    xhr.send((opts&&opts.body)||null);
  };

  Api.prototype._html = function(url, cb) {
    this._req(this.proxy+url, function(err, t) { if(err){cb(err);return;} var d=parseHTML(t); if(!d){cb(new Error("Parse fail"));return;} cb(null,d); });
  };

  Api.prototype._json = function(url, body, cb) {
    this._req(this.proxy+url, {method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:body}, function(err,t){if(err){cb(err);return;} try{cb(null,JSON.parse(t));}catch(e){cb(new Error("Bad JSON"));} });
  };

  // Central
  Api.prototype._cInfo = function(slug, cb) {
    this._html("https://centralnovel.com/series/"+slug+"/", function(err,d){if(err){cb(err);return;}
      var name=txt(qs(d,"h1[itemprop=name]")); var desc=txt(qs(d,".entry-content")); var cover=attr(qs(d,"div.thumb img"),"src");
      var a = qsa(d,".eplister a"); var f=[]; for(var i=0;i<a.length;i++) if(i%2===0) f.push(a[i]); var rv=[]; for(var i=f.length-1;i>=0;i--) rv.push(f[i]);
      var ch=[]; for(var i=0;i<rv.length;i++){var e=rv[i],divs=qsa(e,"div"),t="";for(var j=0;j<divs.length&&j<2;j++){if(j>0)t+=" - ";t+=txt(divs[j]);}var h=attr(e,"href").split("/");while(h.length&&h[h.length-1]==="")h.pop();h=h.length?h[h.length-1]:"";ch.push([t,h]);}
      var gEls=qsa(d,".genxed a"),genres=[];for(var i=0;i<gEls.length;i++){var g=gEls[i],gh=attr(g,"href").split("/");while(gh.length&&gh[gh.length-1]==="")gh.pop();gh=gh.length?gh[gh.length-1]:"";genres.push([gh,txt(g)]);}
      cb(null,{nome:name,desc:desc,cover:cover,chapters:ch,genres:genres});
    });
  };

  Api.prototype._cCh = function(ch, cb) {
    this._html("https://centralnovel.com/"+ch+"/", function(err,d){if(err){cb(err);return;}
      cb(null,{title:txt(qs(d,"h1.entry-title")),subtitle:txt(qs(d,"div.cat-series")),content:html(qs(d,"div.epcontent.entry-content"))});
    });
  };

  Api.prototype._cSearch = function(text, cb) {
    this._json("https://centralnovel.com/wp-admin/admin-ajax.php","action=ts_ac_do_search&ts_ac_query="+encodeURIComponent(text), function(err,j){if(err||!j||!j.series||!j.series[0]){cb(null,[]);return;}
      var items=j.series[0].all||[],res=[];for(var i=0;i<items.length;i++){var a=items[i],link=a.post_link||"",parts=link.split("/");while(parts.length&&parts[parts.length-1]==="")parts.pop();var slug=parts.length?parts[parts.length-1]:"";if(!slug)continue;res.push({nome:a.post_title||"Sem Titulo",url:"central-"+slug,source:"central"});}
      cb(null,res);
    });
  };

  // Illusia
  Api.prototype._iLan = function(cb) {
    this._html("https://illusia.com.br/lancamentos/", function(err,d){if(err){cb(null,[]);return;}
      var items=qsa(d,"li._latest-updates"),res=[];for(var i=0;i<items.length;i++){var it=items[i],a=qsa(it,"a")[0],slug=attr(a,"href").split("/");while(slug.length&&slug[slug.length-1]==="")slug.pop();slug=slug.length?slug[slug.length-1]:"";res.push({url:"illusia-"+slug,nome:attr(a,"title"),source:"illusia"});}
      cb(null,res);
    });
  };

  Api.prototype._iInfo = function(slug, cb) {
    this._html("https://illusia.com.br/story/"+slug+"/", function(err,d){if(err){cb(err);return;}
      var raw=txt(qs(d,".story__identity-title")).replace(/\n/g," ");
      var pEls=qsa(d,"section.story__summary p"),desc="";for(var i=0;i<pEls.length;i++){if(i>0)desc+="\n";desc+=txt(pEls[i]);}
      var cover=attr(qs(d,".webfeedsFeaturedVisual"),"src");
      var links=qsa(d,".chapter-group__list a"),ch=[];for(var i=0;i<links.length;i++){var a=links[i],h=attr(a,"href").split("/");while(h.length&&h[h.length-1]==="")h.pop();h=h.length?h[h.length-1]:"";ch.push([txt(a),h]);}
      var gEls=qsa(d,"._taxonomy-genre"),genres=[];for(var i=0;i<gEls.length;i++){var g=gEls[i],gh=attr(g,"href").split("/");while(gh.length&&gh[gh.length-1]==="")gh.pop();gh=gh.length?gh[gh.length-1]:"";genres.push([gh,txt(g)]);}
      cb(null,{nome:raw,desc:desc,cover:cover,chapters:ch,genres:genres});
    });
  };

  Api.prototype._iCh = function(novel, ch, cb) {
    this._html("https://illusia.com.br/story/"+novel+"/"+ch+"/", function(err,d){if(err){cb(err);return;}
      cb(null,{title:txt(qs(d,".chapter__story-link")).replace(/\n/g," "),subtitle:txt(qs(d,".chapter__title")).replace(/\n/g," "),content:html(qs(d,"#chapter-content"))});
    });
  };

  Api.prototype._iSearch = function(text, cb) {
    this._html("https://illusia.com.br/?s="+encodeURIComponent(text)+"&post_type=fcn_story", function(err,d){if(err){cb(null,[]);return;}
      var cards=qsa(d,"li.card"),res=[];for(var i=0;i<cards.length;i++){var c=cards[i],link=qs(c,"a"),slug=attr(link,"href").split("/");while(slug.length&&slug[slug.length-1]==="")slug.pop();slug=slug.length?slug[slug.length-1]:"";res.push({nome:txt(link),url:"illusia-"+slug,source:"illusia"});}
      cb(null,res);
    });
  };

  // Mania
  Api.prototype._mLan = function(cb) {
    this._html("https://novelmania.com.br", function(err,d){if(err){cb(null,[]);return;}
      var items=qsa(d,".novels .col-6"),res=[];for(var i=0;i<items.length;i++){var it=items[i],a=qsa(it,"a")[0],h2=qsa(it,"h2")[0],slug=attr(a,"href").split("/");while(slug.length&&slug[slug.length-1]==="")slug.pop();slug=slug.length?slug[slug.length-1]:"";res.push({url:"mania-"+slug,nome:txt(h2),source:"mania"});}
      cb(null,res);
    });
  };

  Api.prototype._mInfo = function(slug, cb) {
    this._html("https://novelmania.com.br/novels/"+slug+"/", function(err,d){if(err){cb(err);return;}
      var name=txt(qs(d,"h1")); var pEls=qsa(d,"div.text p"),desc="";for(var i=0;i<pEls.length;i++){if(i>0)desc+="\n";desc+=txt(pEls[i]);}
      var cover=attr(qs(d,".img-responsive"),"src"); var links=qsa(d,"ol.list-inline li a"),ch=[];for(var i=0;i<links.length;i++){var a=links[i];var h=attr(a,"href").split("/");while(h.length&&h[h.length-1]==="")h.pop();h=h.length?h[h.length-1]:"";ch.push([txt(qs(a,"strong")),h]);}
      var gEls=qsa(d,".list-tags a"),genres=[];for(var i=0;i<gEls.length;i++){var g=gEls[i],gh=attr(g,"href").split("/");while(gh.length&&gh[gh.length-1]==="")gh.pop();gh=gh.length?gh[gh.length-1]:"";genres.push([gh,attr(g,"title")]);}
      cb(null,{nome:name,desc:desc,cover:cover,chapters:ch,genres:genres});
    });
  };

  Api.prototype._mCh = function(novel, ch, cb) {
    this._html("https://novelmania.com.br/novels/"+novel+"/capitulos/"+ch, function(err,d){if(err){cb(err);return;}
      cb(null,{title:txt(qs(d,"h3.mb-0")),subtitle:txt(qs(d,"h2.mt-0")),content:html(qs(d,"#chapter-content"))});
    });
  };

  Api.prototype._mSearch = function(text, cb) {
    this._html("https://novelmania.com.br/novels?titulo="+encodeURIComponent(text), function(err,d){if(err){cb(null,[]);return;}
      var items=qsa(d,".top-novels"),res=[];for(var i=0;i<items.length;i++){var it=items[i],link=qs(it,"a"),h5=qs(it,"h5"),slug=attr(link,"href").split("/");while(slug.length&&slug[slug.length-1]==="")slug.pop();slug=slug.length?slug[slug.length-1]:"";res.push({nome:txt(h5),url:"mania-"+slug,source:"mania"});}
      cb(null,res);
    });
  };

  // Public API
  Api.prototype.search = function(text, cb) {
    var self=this; parallel([function(c){self._cSearch(text,c);},function(c){self._iSearch(text,c);},function(c){self._mSearch(text,c);}], function(e,r){if(e){cb(null,[]);return;}cb(null,(r[0]||[]).concat(r[1]||[]).concat(r[2]||[]));});
  };

  Api.prototype.lancamentos = function(cb) {
    var self=this; parallel([function(c){self._cSearch("",c);},function(c){self._iLan(c);},function(c){self._mLan(c);}], function(e,r){if(e){cb(null,[]);return;}cb(null,(r[0]||[]).concat(r[1]||[]).concat(r[2]||[]));});
  };

  Api.prototype.novelInfo = function(novelId, cb) {
    var p=novelId.split("-"),src=p[0],id=p.slice(1).join("-");
    if (src==="central") this._cInfo(id,cb);
    else if (src==="illusia") this._iInfo(id,cb);
    else if (src==="mania") this._mInfo(id,cb);
    else cb(new Error("Unknown source"));
  };

  Api.prototype.chapter = function(novelId, chapterId, cb) {
    var self=this,p=novelId.split("-"),src=p[0],id=p.slice(1).join("-");
    this.novelInfo(novelId, function(err,info){if(err){cb(err);return;}
      var fn; if(src==="central") fn=function(cb2){self._cCh(chapterId,cb2);}; else if(src==="illusia") fn=function(cb2){self._iCh(id,chapterId,cb2);}; else if(src==="mania") fn=function(cb2){self._mCh(id,chapterId,cb2);}; else {cb(new Error("Unknown source"));return;}
      fn(function(err2,ch){if(err2){cb(err2);return;}
        var list=info.chapters||[],idx=-1;for(var i=0;i<list.length;i++){if(list[i][1]===chapterId){idx=i;break;}}
        var next=null,prev=null; if(idx!==-1){if(idx>0)next=list[idx-1][1];if(idx<list.length-1)prev=list[idx+1][1];}
        cb(null,{title:ch.title,subtitle:ch.subtitle,content:ch.content,novelTitle:info.nome,prevChapterId:prev,nextChapterId:next});
      });
    });
  };

  // ===== APP =====

  function App() {
    var self = this;
    this.api = new Api();
    this.novelId = null;
    this.novelInfo = null;
    this.chapterId = null;
    this.chapterNovelId = null;

    this.views = {
      home: document.getElementById("view-home"),
      details: document.getElementById("view-details"),
      reader: document.getElementById("view-reader")
    };
    this.loader = document.getElementById("loader");

    var h = storage.get("uninovel_history");
    this.history = h || [];

    document.getElementById("search-input").onkeypress = function(e) {
      var k = e.keyCode||e.which; if (k===13) self.search();
    };
    document.getElementById("search-btn").onclick = function() { self.search(); };
    document.getElementById("logo-title").onclick = function() { self.goHome(); };
    document.getElementById("logo-title").onkeypress = function(e) {
      var k = e.keyCode||e.which; if (k===13) self.goHome();
    };
    document.getElementById("back-btn").onclick = function() { self.goBack(); };
    document.getElementById("btn-list").onclick = function() { self.goBackToDetails(); };
    document.getElementById("btn-prev").onclick = function() { self.navChapter(-1); };
    document.getElementById("btn-next").onclick = function() { self.navChapter(1); };
    document.getElementById("btn-prev-btm").onclick = function() { self.navChapter(-1); };
    document.getElementById("btn-next-btm").onclick = function() { self.navChapter(1); };

    this.loadReleases();
  }

  App.prototype.showView = function(name) {
    for (var k in this.views) if (this.views.hasOwnProperty(k)) removeClass(this.views[k], "active");
    addClass(this.views[name], "active");
  };

  App.prototype.toggleLoader = function(s) { this.loader.style.display = s ? "block" : "none"; };

  App.prototype.goBack = function() { this.showView("home"); this.renderHistory(); };

  App.prototype.goBackToDetails = function() { if (this.novelId) this.showView("details"); else this.goHome(); };

  App.prototype.goHome = function() {
    document.getElementById("search-input").value = "";
    document.getElementById("home-title").innerHTML = "New Releases";
    this.loadReleases();
  };

  App.prototype.loadReleases = function() {
    var self = this;
    this.showView("home");
    this.renderHistory();
    document.getElementById("novel-list").innerHTML = "";
    this.toggleLoader(true);
    this.api.lancamentos(function(err, novels) {
      self.toggleLoader(false);
      if (err) { document.getElementById("novel-list").innerHTML = '<div class="error">Network Error.</div>'; return; }
      self.renderGrid(novels, "novel-list");
    });
  };

  App.prototype.search = function() {
    var self = this;
    var q = document.getElementById("search-input").value;
    if (!q) return;
    this.showView("home");
    document.getElementById("home-title").innerHTML = 'Search: "' + q + '"';
    document.getElementById("novel-list").innerHTML = "";
    document.getElementById("history-section").style.display = "none";
    this.toggleLoader(true);
    this.api.search(q, function(err, novels) {
      self.toggleLoader(false);
      if (err) console.error(err);
      self.renderGrid(novels, "novel-list");
    });
  };

  App.prototype.renderGrid = function(novels, containerId) {
    var container = document.getElementById(containerId);
    var unique = [], seen = {};
    for (var i = 0; i < novels.length; i++) { if (!seen[novels[i].url]) { seen[novels[i].url] = true; unique.push(novels[i]); } }
    if (unique.length === 0) { container.innerHTML = '<div style="padding:16px;color:#888;">No results found.</div>'; return; }
    var h = "";
    for (var i = 0; i < unique.length; i++) {
      var n = unique[i];
      h += '<div class="novel-card" tabindex="0" onclick="app.openNovel(\'' + n.url + '\')">';
      h += '<span class="s-badge">' + n.source + '</span>';
      h += '<h3>' + n.nome + '</h3></div>';
    }
    container.innerHTML = h;
  };

  App.prototype.renderHistory = function() {
    var container = document.getElementById("history-list");
    var section = document.getElementById("history-section");
    if (!this.history || !this.history.length) { section.style.display = "none"; return; }
    section.style.display = "block";
    var h = "";
    for (var i = 0; i < this.history.length; i++) {
      var item = this.history[i];
      h += '<div class="novel-card" tabindex="0" onclick="app.readChapter(\'' + item.id + '\',\'' + item.chapterId + '\')">';
      h += '<span class="s-badge">' + item.source + '</span>';
      h += '<h3>' + item.title + '</h3>';
      h += '<div class="h-badge">&#9654; ' + (item.chapterTitle || "Continue") + '</div></div>';
    }
    container.innerHTML = h;
  };

  App.prototype.openNovel = function(id) {
    var self = this;
    this.novelId = id;
    this.showView("details");
    var container = document.getElementById("details-container");
    container.innerHTML = "";
    this.toggleLoader(true);
    this.api.novelInfo(id, function(err, info) {
      self.toggleLoader(false);
      if (err) { container.innerHTML = '<div class="error">Failed to load novel info.</div>'; console.error(err); return; }
      self.novelInfo = info;

      var gh = "";
      if (info.genres) for (var i = 0; i < info.genres.length; i++) gh += '<span class="tag">' + info.genres[i][1] + '</span>';

      var hi = null;
      for (var i = 0; i < self.history.length; i++) { if (self.history[i].id === id) { hi = self.history[i]; break; } }
      var cb = "";
      if (hi && hi.chapterTitle) cb = '<button class="continue-btn" onclick="app.readChapter(\'' + id + '\',\'' + hi.chapterId + '\')">&#9654; Continue: ' + hi.chapterTitle + '</button>';

      var ch = "";
      for (var i = 0; i < info.chapters.length; i++) {
        var c = info.chapters[i];
        ch += '<div class="chapter-item" tabindex="0" onclick="app.readChapter(\'' + id + '\',\'' + c[1] + '\')">' + c[0] + '</div>';
      }

      container.innerHTML =
        '<div class="details-info"><h2>' + info.nome + '</h2>' +
        '<div style="margin-bottom:8px">' + gh + '</div>' +
        '<div class="desc">' + (info.desc || "No description.") + '</div></div>' +
        cb +
        '<div style="font-size:15px;margin-bottom:8px;color:#0066cc;font-weight:bold;">Chapters (' + info.chapters.length + ')</div>' +
        '<div class="chapter-list">' + ch + '</div>';
    });
  };

  App.prototype.readChapter = function(novelId, chId) {
    var self = this;
    this.showView("reader");
    var cd = document.getElementById("reader-content");
    var ts = document.getElementById("reader-chapter-title");
    var ns = document.getElementById("reader-novel-title");
    cd.innerHTML = ""; ts.innerHTML = "Loading..."; ns.innerHTML = "";
    this.toggleLoader(true);
    this.chapterId = chId;
    this.chapterNovelId = novelId;

    this.api.chapter(novelId, chId, function(err, data) {
      self.toggleLoader(false);
      if (err) { cd.innerHTML = '<div class="error">Failed to load chapter.</div>'; console.error(err); return; }
      ns.innerHTML = data.novelTitle;
      ts.innerHTML = data.title;
      cd.innerHTML = '<h2 style="margin-bottom:10px;font-size:18px;">' + data.title + '</h2>' +
        '<h4 style="margin-bottom:16px;color:#555;font-size:14px;">' + (data.subtitle||"") + '</h4>' +
        '<hr style="border-color:#ddd;margin-bottom:16px">' + data.content;
      self.updateHistory(novelId, chId, data.title);

      var pb1 = document.getElementById("btn-prev"), pb2 = document.getElementById("btn-prev-btm");
      var nb1 = document.getElementById("btn-next"), nb2 = document.getElementById("btn-next-btm");

      pb1.disabled = !data.nextChapterId; pb2.disabled = !data.nextChapterId;
      pb1.innerHTML = "Prev"; pb2.innerHTML = "Prev";
      nb1.disabled = !data.prevChapterId; nb2.disabled = !data.prevChapterId;
      nb1.innerHTML = "Next"; nb2.innerHTML = "Next";
    });
  };

  App.prototype.navChapter = function(dir) {
    if (!this.chapterNovelId || !this.chapterId) return;
    var self = this, nid = this.chapterNovelId, cid = this.chapterId;
    this.api.chapter(nid, cid, function(err, data) {
      if (err) return;
      var t = dir < 0 ? data.nextChapterId : data.prevChapterId;
      if (t) self.readChapter(nid, t);
    });
  };

  App.prototype.updateHistory = function(novelId, chId, chTitle) {
    var existing = null;
    for (var i = 0; i < this.history.length; i++) { if (this.history[i].id === novelId) { existing = this.history[i]; break; } }
    var title = "Unknown Novel";
    if (this.novelInfo) title = this.novelInfo.nome;
    else if (existing) title = existing.title;
    var entry = { id: novelId, title: title, chapterId: chId, chapterTitle: chTitle, source: novelId.split("-")[0], timestamp: Date.now() };
    this.history = this.history.filter(function(h) { return h.id !== novelId; });
    this.history.unshift(entry);
    if (this.history.length > 20) this.history.pop();
    storage.set("uninovel_history", this.history);
  };

  window.app = new App();
</script>
</body>
</html>
